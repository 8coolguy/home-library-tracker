services:
  app:
    build: .
    volumes:
      - library_db:/data
      - library_uploads:/uploads
    environment:
      HOME_LIBRARY_DB: sqlite:////data/home_library.db
      HOME_LIBRARY_UPLOADS: /uploads
      HOME_LIBRARY_OCR_CONFIDENCE: "0.5"
      HOME_LIBRARY_GOOGLE_BOOKS_KEY: ${HOME_LIBRARY_GOOGLE_BOOKS_KEY:-}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  library_db:
  library_uploads:
  caddy_data:
  caddy_config:
